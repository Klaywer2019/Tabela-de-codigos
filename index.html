<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Dev - Início</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #e0e0e0; padding: 20px; line-height: 1.6; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #00d4ff; font-size: 2.2rem; }
        
        /* Botões de Navegação */
        .nav-paginas { text-align: center; margin-bottom: 30px; }
        .btn-nav { background-color: #00d4ff; color: #0f0f0f; padding: 8px 16px; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 5px; display: inline-block; transition: 0.3s; }
        .btn-nav:hover { background-color: #00ff88; }

        h2 { color: #00ff88; margin: 30px 0 20px 0; border-left: 4px solid #00ff88; padding-left: 10px; }
        .container-tabela { overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; background-color: #1a1a1a; border: 1px solid #333; }
        th { background-color: #252525; color: #00d4ff; padding: 15px; text-align: left; border: 1px solid #333; }
        td { padding: 15px; border: 1px solid #333; vertical-align: middle; font-size: 0.95rem; }
        code { background-color: #2d2d2d; color: #ff79c6; padding: 4px 8px; border-radius: 4px; font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Dicionário de Código 🚀</h1>
        <p>Aprenda a programar de um jeito fácil!</p>
    </header>

    <nav class="nav-paginas">
        <a href="index.html" class="btn-nav">Página 1</a>
        <a href="pagina2.html" class="btn-nav">Página 2 »</a>
    </nav>

    <main>
        <h2>Tabela: Básico (Página 1)</h2>
        <div class="container-tabela">
            <table>
                <thead>
                    <tr><th>Código</th><th>O que faz?</th><th>Exemplo</th></tr>
                </thead>
                <tbody>
                    <tr><td><code>&lt;h1&gt;</code></td><td>Título principal</td><td>&lt;h1&gt;Oi&lt;/h1&gt;</td></tr>
                    <tr><td><code>color</code></td><td>Cor do texto</td><td>color: red;</td></tr>
                    <tr><td><code>&lt;img&gt;</code></td><td>Imagem</td><td>&lt;img src="foto.jpg"&gt;</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
