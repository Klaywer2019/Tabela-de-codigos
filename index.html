<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Dev - Meu Projeto</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/style.css?v=1.1">

</head>
<body>

    <header>
        <h1>Dicionário de Código 🚀</h1>
        <p>Aprenda a programar de um jeito fácil e lógico!</p>
    </header>

    <main>
        <h2>Tabela: HTML & CSS Inicial</h2>
        
        <div class="container-tabela">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>O que faz?</th>
                        <th>Exemplo Prático</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><code>&lt;h1&gt;</code></td>
                        <td>Cria o título principal da página</td>
                        <td>&lt;h1&gt;Olá Mundo&lt;/h1&gt;</td>
                    </tr>
                    <tr>
                        <td><code>color</code></td>
                        <td>Muda a cor do texto no CSS</td>
                        <td>color: red;</td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </main>

</body>
</html>
